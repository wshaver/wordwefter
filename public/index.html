<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WordWefter</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17202a;
      --paper: #f7f4ec;
      --accent: #0f8b8d;
      --warm: #f2b134;
      --rose: #d94f70;
      --board-line: #9ca79c;
      --tile: #fbdfa3;
      --tile-edge: #c69238;
      --play-width: min(78vh, 92vw, 640px);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      overflow: auto;
      background:
        linear-gradient(135deg, rgba(15, 139, 141, 0.16), transparent 34%),
        linear-gradient(315deg, rgba(217, 79, 112, 0.14), transparent 40%),
        var(--paper);
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
    }

    main {
      min-height: 100vh;
      width: min(94vw, 1080px);
      margin: 0 auto;
      padding: clamp(2rem, 7vw, 5rem) clamp(1rem, 4vw, 2rem);
      display: grid;
      place-items: center;
      gap: 1.25rem;
      text-align: center;
    }

    .masthead {
      display: grid;
      justify-items: center;
      gap: 2.35rem;
      transition: transform 220ms ease, padding 220ms ease;
    }

    .brand {
      position: relative;
      display: inline-block;
      margin: 0;
      font-size: clamp(3rem, 13vw, 8rem);
      line-height: 0.92;
      letter-spacing: 0;
      text-transform: none;
      text-wrap: balance;
      color: var(--ink);
      transition: font-size 220ms ease, text-shadow 220ms ease;
      text-shadow:
        0.04em 0.04em 0 var(--warm),
        -0.03em 0.07em 0 rgba(15, 139, 141, 0.7);
    }

    .brand::before,
    .brand::after {
      content: "";
      position: absolute;
      left: 50%;
      width: 64%;
      height: 0.12em;
      border-radius: 999px;
      transform: translateX(-50%);
      background: linear-gradient(90deg, var(--accent), var(--rose), var(--warm));
    }

    .brand::before {
      top: -0.2em;
    }

    .brand::after {
      bottom: -0.24em;
      width: 42%;
    }

    .game-controls {
      display: grid;
      justify-items: center;
      gap: 0.75rem;
    }

    .identity-panel,
    .identity-bar,
    .welcome-actions,
    .play-menu {
      display: none;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.75rem;
    }

    .identity-panel {
      justify-items: center;
    }

    .identity-bar {
      align-items: center;
      color: var(--ink);
      font: 700 0.92rem/1.25 system-ui, sans-serif;
    }

    .identity-name {
      color: var(--accent);
      font-weight: 800;
    }

    .player-setup {
      display: none;
      justify-items: center;
      gap: 0.65rem;
    }

    .player-name-list {
      display: grid;
      gap: 0.45rem;
    }

    .player-name-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 0.45rem;
    }

    .player-name-input {
      min-height: 2.75rem;
      width: min(82vw, 22rem);
      border: 2px solid var(--ink);
      border-radius: 8px;
      padding: 0.65rem 0.8rem;
      background: rgba(255, 255, 255, 0.72);
      color: var(--ink);
      font: 700 1rem/1 system-ui, sans-serif;
    }

    .player-name-remove {
      min-width: 2.75rem;
      padding-inline: 0.75rem;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      clip-path: inset(50%);
    }

    .game-button {
      min-height: 2.75rem;
      border: 2px solid var(--ink);
      border-radius: 8px;
      padding: 0.7rem 1.1rem;
      background: var(--accent);
      color: #ffffff;
      cursor: pointer;
      font: 700 1rem/1 system-ui, sans-serif;
      box-shadow: 0.18rem 0.18rem 0 var(--warm);
    }

    .game-button.secondary {
      background: #ffffff;
      color: var(--ink);
    }

    .game-button:hover {
      background: #0b7375;
    }

    .game-button.secondary:hover {
      background: #f4f1e7;
    }

    .active-games {
      width: min(92vw, 42rem);
      display: none;
      gap: 0.65rem;
      justify-items: stretch;
      font: 700 0.95rem/1.35 system-ui, sans-serif;
    }

    .active-games-list {
      display: grid;
      gap: 0.45rem;
    }

    .active-game-row {
      display: grid;
      grid-template-columns: 5.5rem minmax(0, 1fr) auto;
      align-items: center;
      gap: 0.65rem;
      padding: 0.55rem 0.65rem;
      border: 2px solid rgba(23, 32, 42, 0.22);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.52);
      text-align: left;
    }

    .active-game-id {
      font: 800 1rem/1 system-ui, sans-serif;
      letter-spacing: 0.08em;
    }

    .active-game-players {
      overflow-wrap: anywhere;
    }

    .active-game-turn {
      display: block;
      margin-top: 0.15rem;
      color: var(--accent);
      font: 800 0.82rem/1.25 system-ui, sans-serif;
    }

    .game-area {
      display: none;
      width: 100%;
      justify-items: center;
      gap: 1rem;
    }

    body.screen-welcome:not(.has-player) .identity-panel {
      display: grid;
    }

    body.has-player .identity-bar {
      display: flex;
    }

    body.screen-welcome.has-player .welcome-actions {
      display: flex;
    }

    body.screen-setup .player-setup {
      display: grid;
    }

    body.screen-list .active-games {
      display: grid;
    }

    body.screen-play .game-area {
      display: grid;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      grid-template-rows: repeat(12, minmax(0, 1fr));
      width: var(--play-width);
      aspect-ratio: 1;
      border: 3px solid var(--ink);
      background: var(--board-line);
      gap: 1px;
      padding: 1px;
    }

    .board-cell {
      position: relative;
      display: grid;
      place-items: center;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.68);
    }

    .board-cell.drop-ready {
      background: rgba(15, 139, 141, 0.24);
    }

    .rack-wrap {
      width: var(--play-width);
      display: grid;
      gap: 0.75rem;
      justify-items: start;
    }

    .rack {
      width: 100%;
      min-height: 4.75rem;
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      grid-auto-rows: minmax(0, 1fr);
      gap: clamp(0.35rem, 1.8vw, 0.75rem);
      padding: clamp(0.45rem, 1.8vw, 0.75rem);
      border: 3px solid var(--ink);
      border-radius: 8px;
      background: rgba(23, 32, 42, 0.08);
    }

    .tile {
      position: relative;
      display: grid;
      place-items: center;
      aspect-ratio: 1;
      border: 2px solid var(--tile-edge);
      border-radius: 8px;
      background: var(--tile);
      color: var(--ink);
      font: 800 clamp(1.35rem, 6vw, 2.25rem)/1 Georgia, "Times New Roman", serif;
      box-shadow: inset 0 -0.25rem 0 rgba(0, 0, 0, 0.08);
      user-select: none;
    }

    .tile-movable {
      cursor: pointer;
    }

    .tile:active {
      cursor: pointer;
    }

    .tile-active-placement {
      outline: 2px solid var(--rose);
      outline-offset: -3px;
      box-shadow:
        inset 0 -0.25rem 0 rgba(0, 0, 0, 0.08),
        0 0 0 1px rgba(217, 79, 112, 0.24);
    }

    .tile-placement-error {
      animation: tile-flash 420ms ease-in-out 2;
    }

    .tile-remote-play {
      animation: remote-play-flash 1400ms ease-out 1;
    }

    @keyframes tile-flash {
      0%,
      100% {
        background: var(--tile);
      }

      50% {
        background: #ffd1dc;
      }
    }

    @keyframes remote-play-flash {
      0% {
        transform: scale(0.82);
        background: #ffffff;
        box-shadow:
          inset 0 -0.16rem 0 rgba(0, 0, 0, 0.08),
          0 0 0 0.35rem rgba(15, 139, 141, 0.55);
      }

      45% {
        transform: scale(1.06);
        background: #cceff0;
      }

      100% {
        transform: scale(1);
        background: var(--tile);
      }
    }

    .tile-points {
      position: absolute;
      right: 0.35rem;
      bottom: 0.25rem;
      font: 700 clamp(0.58rem, 2.2vw, 0.78rem)/1 system-ui, sans-serif;
    }

    .board .tile {
      width: calc(100% - 8px);
      max-width: 100%;
      border-width: 2px;
      border-radius: 6px;
      font-size: clamp(1rem, 3.4vw, 1.9rem);
      box-shadow: inset 0 -0.16rem 0 rgba(0, 0, 0, 0.08);
      cursor: default;
    }

    .board .tile-movable {
      cursor: pointer;
    }

    .board .tile-points {
      right: 0.2rem;
      bottom: 0.18rem;
      font-size: clamp(0.48rem, 1.4vw, 0.68rem);
    }

    body.screen-play main {
      align-content: start;
      padding-top: clamp(1.25rem, 3vw, 2rem);
    }

    body.screen-play .masthead {
      gap: 1.15rem;
    }

    body.screen-play .brand {
      font-size: clamp(1.85rem, 5vw, 3.35rem);
    }

    body.screen-play .play-menu {
      display: flex;
    }

    .draw-tile-button {
      display: none;
    }

    body.screen-play .draw-tile-button {
      display: inline-block;
    }

    .rack-controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      justify-self: center;
      gap: 0.75rem;
    }

    .placement-action {
      display: none;
    }

    body.has-active-placement .placement-action {
      display: inline-block;
    }

    .game-message {
      min-height: 1.25rem;
      justify-self: center;
      color: var(--rose);
      font: 700 0.9rem/1.3 system-ui, sans-serif;
    }

    body.screen-play:not(.is-my-turn) .game-message {
      color: var(--accent);
    }

    body.screen-play:not(.is-my-turn) .rack,
    body.screen-play:not(.is-my-turn) .board {
      opacity: 0.82;
    }

    body.screen-play:not(.is-my-turn) .tile-movable {
      cursor: not-allowed;
    }

    .game-button:disabled {
      cursor: not-allowed;
      opacity: 0.58;
      box-shadow: none;
    }

    .score-panel {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 0.5rem;
      padding: 0.7rem 0.85rem;
      border: 2px solid rgba(23, 32, 42, 0.28);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.46);
      font: 700 0.95rem/1.2 system-ui, sans-serif;
    }

    .score-row {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
    }

    .state-debug {
      width: 100%;
      display: grid;
      gap: 0.5rem;
    }

    .state-debug textarea {
      width: 100%;
      min-height: 8rem;
      resize: vertical;
      border: 2px solid rgba(23, 32, 42, 0.28);
      border-radius: 8px;
      padding: 0.65rem;
      background: rgba(255, 255, 255, 0.72);
      color: var(--ink);
      font: 0.78rem/1.35 Consolas, "Courier New", monospace;
    }

    .state-debug .game-button {
      justify-self: center;
    }

    @media (max-width: 520px) {
      main {
        width: 100%;
        padding-inline: 0.75rem;
      }

      .brand {
        font-size: clamp(2.7rem, 17vw, 4.6rem);
      }

      .board {
        width: var(--play-width);
      }

      .rack {
        min-height: 3.8rem;
      }

      .score-panel {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body class="screen-welcome">
  <main aria-label="WordWefter home">
    <header class="masthead">
      <h1 class="brand">WordWefter</h1>
      <div class="game-controls" aria-label="Game controls">
        <div class="identity-panel" id="identity-panel" aria-label="Player identity">
          <label class="sr-only" for="identity-name-input">Your name</label>
          <input class="player-name-input" id="identity-name-input" type="text" aria-label="Your name" placeholder="Your name">
          <button class="game-button" type="button" id="save-identity-button">Continue</button>
        </div>
        <div class="identity-bar" id="identity-bar" aria-label="Current player">
          <span>Playing as <span class="identity-name" id="identity-name-display"></span></span>
          <button class="game-button secondary" type="button" id="logout-button">Logout</button>
        </div>
        <div class="welcome-actions" id="welcome-actions" aria-label="Welcome menu">
          <button class="game-button" type="button" id="show-new-game-button">New Game</button>
          <button class="game-button secondary" type="button" id="show-game-list-button">Game List</button>
        </div>
        <div class="player-setup" id="player-setup" aria-label="Player setup">
          <div class="player-name-list" id="player-name-list">
            <div class="player-name-row">
              <label class="sr-only" for="player-name-input-1">Player 1 name</label>
              <input class="player-name-input" id="player-name-input-1" type="text" value="Player 1" aria-label="Player 1 name">
              <button class="game-button secondary player-name-remove" type="button" aria-label="Remove player">-</button>
            </div>
            <div class="player-name-row">
              <label class="sr-only" for="player-name-input-2">Player 2 name</label>
              <input class="player-name-input" id="player-name-input-2" type="text" value="Player 2" aria-label="Player 2 name">
              <button class="game-button secondary player-name-remove" type="button" aria-label="Remove player">-</button>
            </div>
          </div>
          <div class="game-controls">
            <button class="game-button secondary" type="button" id="add-player-button">Add Player</button>
            <button class="game-button" type="button" id="create-game-button">Create Game</button>
            <button class="game-button secondary" type="button" id="setup-game-list-button">Game List</button>
          </div>
        </div>
      </div>
      <section class="active-games" aria-label="Active games">
        <div id="active-games-list" class="active-games-list"></div>
      </section>
      <div class="game-message" id="game-message" role="status" aria-live="polite"></div>
    </header>

    <section class="game-area" aria-label="Game board">
      <div class="play-menu" aria-label="Game menu">
        <button class="game-button secondary" type="button" id="play-new-game-button">New Game</button>
        <button class="game-button secondary" type="button" id="play-game-list-button">Game List</button>
      </div>
      <div class="board" id="board" aria-label="12 by 12 board"></div>
      <div class="rack-wrap">
        <div class="rack" id="rack" aria-label="Rack"></div>
        <div class="rack-controls" aria-label="Rack controls">
          <button class="game-button draw-tile-button" type="button" id="draw-tile-button">Draw Tile</button>
          <button class="game-button placement-action" type="button" id="finish-placement-button">Finish</button>
          <button class="game-button placement-action" type="button" id="reset-placement-button">Reset</button>
        </div>
        <div class="score-panel" aria-label="Score">
          <div class="score-row">
            <span>Who's turn</span>
            <span id="current-player-name">Player 1</span>
          </div>
          <div class="score-row">
            <span>Game ID</span>
            <span id="current-game-id">-----</span>
          </div>
          <div class="score-row">
            <span>Current score</span>
            <span id="current-score">0</span>
          </div>
          <div class="score-row">
            <span>Current turn</span>
            <span id="current-turn-score">0</span>
          </div>
        </div>
        <div class="state-debug" aria-label="Game state JSON debug">
          <textarea id="game-state-json" spellcheck="false" aria-label="Game state JSON"></textarea>
          <button class="game-button" type="button" id="install-game-state-button">Install</button>
        </div>
      </div>
    </section>
  </main>

  <script src="./jquery-4.0.0.min.js"></script>
  <script src="./lodash.js"></script>
  <script src="./sortable.min.js"></script>
  <script type="module" src="./game.js?v=turn-polling"></script>
</body>
</html>
