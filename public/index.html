<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WordWefter</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17202a;
      --paper: #f7f4ec;
      --accent: #0f8b8d;
      --warm: #f2b134;
      --rose: #d94f70;
      --board-line: #9ca79c;
      --tile: #fbdfa3;
      --tile-edge: #c69238;
      --play-width: min(78vh, 92vw, 640px);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      overflow: auto;
      background:
        linear-gradient(135deg, rgba(15, 139, 141, 0.16), transparent 34%),
        linear-gradient(315deg, rgba(217, 79, 112, 0.14), transparent 40%),
        var(--paper);
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
    }

    main {
      min-height: 100vh;
      width: min(94vw, 1080px);
      margin: 0 auto;
      padding: clamp(2rem, 7vw, 5rem) clamp(1rem, 4vw, 2rem);
      display: grid;
      place-items: center;
      gap: 1.25rem;
      text-align: center;
    }

    .masthead {
      display: grid;
      justify-items: center;
      gap: 2.35rem;
      transition: transform 220ms ease, padding 220ms ease;
    }

    .brand {
      position: relative;
      display: inline-block;
      margin: 0;
      font-size: clamp(3rem, 13vw, 8rem);
      line-height: 0.92;
      letter-spacing: 0;
      text-transform: none;
      text-wrap: balance;
      color: var(--ink);
      transition: font-size 220ms ease, text-shadow 220ms ease;
      text-shadow:
        0.04em 0.04em 0 var(--warm),
        -0.03em 0.07em 0 rgba(15, 139, 141, 0.7);
    }

    .brand::before,
    .brand::after {
      content: "";
      position: absolute;
      left: 50%;
      width: 64%;
      height: 0.12em;
      border-radius: 999px;
      transform: translateX(-50%);
      background: linear-gradient(90deg, var(--accent), var(--rose), var(--warm));
    }

    .brand::before {
      top: -0.2em;
    }

    .brand::after {
      bottom: -0.24em;
      width: 42%;
    }

    .game-controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.75rem;
    }

    .game-button {
      min-height: 2.75rem;
      border: 2px solid var(--ink);
      border-radius: 8px;
      padding: 0.7rem 1.1rem;
      background: var(--accent);
      color: #ffffff;
      cursor: pointer;
      font: 700 1rem/1 system-ui, sans-serif;
      box-shadow: 0.18rem 0.18rem 0 var(--warm);
    }

    .game-button:hover {
      background: #0b7375;
    }

    .game-area {
      display: none;
      width: 100%;
      justify-items: center;
      gap: 1rem;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      grid-template-rows: repeat(12, minmax(0, 1fr));
      width: var(--play-width);
      aspect-ratio: 1;
      border: 3px solid var(--ink);
      background: var(--board-line);
      gap: 1px;
      padding: 1px;
    }

    .board-cell {
      position: relative;
      display: grid;
      place-items: center;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.68);
    }

    .board-cell.drop-ready {
      background: rgba(15, 139, 141, 0.24);
    }

    .rack-wrap {
      width: var(--play-width);
      display: grid;
      gap: 0.75rem;
      justify-items: start;
    }

    .rack {
      width: 100%;
      min-height: 4.75rem;
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      grid-auto-rows: minmax(0, 1fr);
      gap: clamp(0.35rem, 1.8vw, 0.75rem);
      padding: clamp(0.45rem, 1.8vw, 0.75rem);
      border: 3px solid var(--ink);
      border-radius: 8px;
      background: rgba(23, 32, 42, 0.08);
    }

    .tile {
      position: relative;
      display: grid;
      place-items: center;
      aspect-ratio: 1;
      border: 2px solid var(--tile-edge);
      border-radius: 8px;
      background: var(--tile);
      color: var(--ink);
      font: 800 clamp(1.35rem, 6vw, 2.25rem)/1 Georgia, "Times New Roman", serif;
      box-shadow: inset 0 -0.25rem 0 rgba(0, 0, 0, 0.08);
      user-select: none;
    }

    .tile[draggable="true"] {
      cursor: pointer;
    }

    .tile:active {
      cursor: pointer;
    }

    .tile-active-placement {
      outline: 2px solid var(--rose);
      outline-offset: -3px;
      box-shadow:
        inset 0 -0.25rem 0 rgba(0, 0, 0, 0.08),
        0 0 0 1px rgba(217, 79, 112, 0.24);
    }

    .tile-placement-error {
      animation: tile-flash 420ms ease-in-out 2;
    }

    @keyframes tile-flash {
      0%,
      100% {
        background: var(--tile);
      }

      50% {
        background: #ffd1dc;
      }
    }

    .tile-points {
      position: absolute;
      right: 0.35rem;
      bottom: 0.25rem;
      font: 700 clamp(0.58rem, 2.2vw, 0.78rem)/1 system-ui, sans-serif;
    }

    .board .tile {
      width: calc(100% - 8px);
      max-width: 100%;
      border-width: 2px;
      border-radius: 6px;
      font-size: clamp(1rem, 3.4vw, 1.9rem);
      box-shadow: inset 0 -0.16rem 0 rgba(0, 0, 0, 0.08);
      cursor: default;
    }

    .board .tile[draggable="true"] {
      cursor: pointer;
    }

    .board .tile-points {
      right: 0.2rem;
      bottom: 0.18rem;
      font-size: clamp(0.48rem, 1.4vw, 0.68rem);
    }

    body.game-started main {
      align-content: start;
      padding-top: clamp(1.25rem, 3vw, 2rem);
    }

    body.game-started .masthead {
      gap: 1.15rem;
    }

    body.game-started .brand {
      font-size: clamp(1.85rem, 5vw, 3.35rem);
    }

    body.game-started .game-area {
      display: grid;
    }

    .draw-tile-button {
      display: none;
    }

    body.game-started .draw-tile-button {
      display: inline-block;
    }

    .rack-controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      justify-self: center;
      gap: 0.75rem;
    }

    .placement-action {
      display: none;
    }

    body.has-active-placement .placement-action {
      display: inline-block;
    }

    .game-message {
      min-height: 1.25rem;
      justify-self: center;
      color: var(--rose);
      font: 700 0.9rem/1.3 system-ui, sans-serif;
    }

    @media (max-width: 520px) {
      main {
        width: 100%;
        padding-inline: 0.75rem;
      }

      .brand {
        font-size: clamp(2.7rem, 17vw, 4.6rem);
      }

      .board {
        width: var(--play-width);
      }

      .rack {
        min-height: 3.8rem;
      }
    }
  </style>
</head>
<body>
  <main aria-label="WordWefter home">
    <header class="masthead">
      <h1 class="brand">WordWefter</h1>
      <div class="game-controls" aria-label="Game controls">
        <button class="game-button" type="button" id="new-game-button">New Game</button>
      </div>
    </header>

    <section class="game-area" aria-label="Game board">
      <div class="board" id="board" aria-label="12 by 12 board"></div>
      <div class="rack-wrap">
        <div class="rack" id="rack" aria-label="Rack"></div>
        <div class="rack-controls" aria-label="Rack controls">
          <button class="game-button draw-tile-button" type="button" id="draw-tile-button">Draw Tile</button>
          <button class="game-button placement-action" type="button" id="finish-placement-button">Finish</button>
          <button class="game-button placement-action" type="button" id="reset-placement-button">Reset</button>
        </div>
        <div class="game-message" id="game-message" role="status" aria-live="polite"></div>
      </div>
    </section>
  </main>

  <script src="./jquery-4.0.0.min.js"></script>
  <script src="./lodash.js"></script>
  <script type="module" src="./game.js"></script>
</body>
</html>
