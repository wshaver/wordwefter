<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WordWefter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,600,0,0" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
      --ink: #17202a;
      --paper: #f7f4ec;
      --accent: #0f8b8d;
      --warm: #f2b134;
      --rose: #d94f70;
      --board-line: #9ca79c;
      --tile: #fbdfa3;
      --tile-edge: #c69238;
      --play-width: min(78vh, 92vw, 640px);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      overflow: auto;
      background:
        linear-gradient(135deg, rgba(15, 139, 141, 0.16), transparent 34%),
        linear-gradient(315deg, rgba(217, 79, 112, 0.14), transparent 40%),
        var(--paper);
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
    }

    main {
      min-height: 100vh;
      width: min(94vw, 1080px);
      margin: 0 auto;
      padding: clamp(2rem, 7vw, 5rem) clamp(1rem, 4vw, 2rem);
      display: grid;
      place-items: center;
      gap: 1.25rem;
      text-align: center;
    }

    .masthead {
      display: grid;
      width: 100%;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      justify-items: stretch;
      gap: 1rem 1.25rem;
      transition: transform 220ms ease, padding 220ms ease;
    }

    .brand {
      position: relative;
      display: block;
      justify-self: start;
      margin: 0;
      font-size: clamp(3rem, 13vw, 8rem);
      line-height: 0.92;
      letter-spacing: 0;
      text-transform: none;
      text-wrap: balance;
      color: var(--ink);
      transition: font-size 220ms ease, text-shadow 220ms ease;
      text-shadow:
        0.04em 0.04em 0 var(--warm),
        -0.03em 0.07em 0 rgba(15, 139, 141, 0.7);
    }

    .brand::before,
    .brand::after {
      content: "";
      position: absolute;
      left: 50%;
      width: 64%;
      height: 0.12em;
      border-radius: 999px;
      transform: translateX(-50%);
      background: linear-gradient(90deg, var(--accent), var(--rose), var(--warm));
    }

    .brand::before {
      top: -0.2em;
    }

    .brand::after {
      bottom: -0.24em;
      width: 42%;
    }

    .game-controls {
      display: grid;
      justify-self: end;
      justify-items: end;
      gap: 0.75rem;
    }

    .identity-panel,
    .identity-bar,
    .identity-menu {
      display: none;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.75rem;
    }

    .identity-panel {
      grid-column: 1 / -1;
      justify-items: center;
    }

    .identity-bar {
      position: relative;
      align-items: center;
      flex-wrap: nowrap;
      color: var(--ink);
      font: 700 0.92rem/1.25 system-ui, sans-serif;
    }

    .identity-current {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      min-width: 0;
    }

    .identity-current .material-symbols-outlined {
      color: var(--accent);
      flex: 0 0 auto;
    }

    .identity-name {
      color: var(--accent);
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .menu-button {
      width: 2.75rem;
      min-width: 2.75rem;
      height: 2.75rem;
      display: grid;
      place-items: center;
      line-height: 1;
    }

    .game-button.menu-button {
      padding: 0;
      padding-inline: 0;
    }

    .material-symbols-outlined {
      font-family: "Material Symbols Outlined";
      font-weight: normal;
      font-style: normal;
      width: 24px;
      height: 24px;
      font-size: 24px;
      line-height: 1;
      letter-spacing: 0;
      text-transform: none;
      display: inline-block;
      white-space: nowrap;
      word-wrap: normal;
      direction: ltr;
      -webkit-font-feature-settings: "liga";
      font-variation-settings:
        "FILL" 0,
        "wght" 600,
        "GRAD" 0,
        "opsz" 24;
    }

    .identity-menu {
      position: absolute;
      top: calc(100% + 0.45rem);
      right: 0;
      z-index: 10;
      min-width: 10rem;
      padding: 0.55rem;
      border: 2px solid rgba(23, 32, 42, 0.28);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0.25rem 0.25rem 0 rgba(242, 177, 52, 0.7);
    }

    body.menu-open .identity-menu {
      display: grid;
    }

    .player-setup {
      display: none;
      justify-items: center;
      gap: 0.65rem;
    }

    .player-name-list {
      display: grid;
      gap: 0.45rem;
    }

    .player-name-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 0.45rem;
    }

    .player-name-input {
      min-height: 2.75rem;
      width: min(82vw, 22rem);
      border: 2px solid var(--ink);
      border-radius: 8px;
      padding: 0.65rem 0.8rem;
      background: rgba(255, 255, 255, 0.72);
      color: var(--ink);
      font: 700 1rem/1 system-ui, sans-serif;
    }

    .player-name-remove {
      min-width: 2.75rem;
      padding-inline: 0.75rem;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      clip-path: inset(50%);
    }

    .game-button {
      min-height: 2.75rem;
      border: 2px solid var(--ink);
      border-radius: 8px;
      padding: 0.7rem 1.1rem;
      background: var(--accent);
      color: #ffffff;
      cursor: pointer;
      font: 700 1rem/1 system-ui, sans-serif;
      box-shadow: 0.18rem 0.18rem 0 var(--warm);
    }

    .game-button.secondary {
      background: #ffffff;
      color: var(--ink);
    }

    .game-button:hover {
      background: #0b7375;
    }

    .game-button.secondary:hover {
      background: #f4f1e7;
    }

    .active-games {
      grid-column: 1 / -1;
      clear: both;
      justify-self: center;
      width: min(92vw, 42rem);
      display: none;
      margin-top: clamp(1.5rem, 3vw, 2.25rem);
      gap: 0.65rem;
      justify-items: stretch;
      font: 700 0.95rem/1.35 system-ui, sans-serif;
    }

    .active-games-list {
      display: grid;
      gap: 0.45rem;
    }

    .active-game-row {
      display: grid;
      grid-template-columns: 5.5rem minmax(0, 1fr) auto;
      align-items: center;
      gap: 0.65rem;
      padding: 0.55rem 0.65rem;
      border: 2px solid rgba(23, 32, 42, 0.22);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.52);
      text-align: left;
    }

    .active-game-id {
      font: 800 1rem/1 system-ui, sans-serif;
      letter-spacing: 0.08em;
    }

    .active-game-players {
      overflow-wrap: anywhere;
    }

    .active-game-turn {
      display: block;
      margin-top: 0.15rem;
      color: var(--accent);
      font: 800 0.82rem/1.25 system-ui, sans-serif;
    }

    .game-area {
      display: none;
      width: 100%;
      justify-items: center;
      gap: 1rem;
    }

    body.screen-welcome:not(.has-player) .identity-panel {
      display: grid;
    }

    body.screen-welcome:not(.has-player) .masthead {
      grid-template-columns: 1fr;
      justify-items: center;
    }

    body.screen-welcome:not(.has-player) .brand,
    body.screen-welcome:not(.has-player) .game-controls {
      justify-self: center;
    }

    body.screen-welcome:not(.has-player) .brand {
      margin-bottom: 0.45em;
    }

    body.has-player .identity-bar {
      display: flex;
    }

    body.screen-setup .player-setup {
      display: grid;
    }

    body.screen-list .active-games {
      display: grid;
    }

    body.screen-play .game-area {
      display: grid;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      grid-template-rows: repeat(12, minmax(0, 1fr));
      width: var(--play-width);
      aspect-ratio: 1;
      border: 3px solid var(--ink);
      background: var(--board-line);
      gap: 1px;
      padding: 1px;
    }

    .board-cell {
      position: relative;
      display: grid;
      place-items: center;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.68);
    }

    .board-cell.drop-ready {
      background: rgba(15, 139, 141, 0.24);
    }

    .rack-wrap {
      width: var(--play-width);
      display: grid;
      gap: 0.75rem;
      justify-items: start;
    }

    .rack {
      width: 100%;
      min-height: 4.75rem;
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      grid-auto-rows: minmax(0, 1fr);
      gap: clamp(0.35rem, 1.8vw, 0.75rem);
      padding: clamp(0.45rem, 1.8vw, 0.75rem);
      border: 3px solid var(--ink);
      border-radius: 8px;
      background: rgba(23, 32, 42, 0.08);
    }

    .tile {
      position: relative;
      display: grid;
      place-items: center;
      aspect-ratio: 1;
      border: 2px solid var(--tile-edge);
      border-radius: 8px;
      background: var(--tile);
      color: var(--ink);
      font: 800 clamp(1.35rem, 6vw, 2.25rem)/1 Georgia, "Times New Roman", serif;
      box-shadow: inset 0 -0.25rem 0 rgba(0, 0, 0, 0.08);
      user-select: none;
    }

    .tile-movable {
      cursor: pointer;
    }

    .tile:active {
      cursor: pointer;
    }

    .tile-active-placement {
      outline: 2px solid var(--rose);
      outline-offset: -3px;
      box-shadow:
        inset 0 -0.25rem 0 rgba(0, 0, 0, 0.08),
        0 0 0 1px rgba(217, 79, 112, 0.24);
    }

    .tile-placement-error {
      animation: tile-flash 420ms ease-in-out 2;
    }

    .tile-remote-play {
      animation: remote-play-flash 1400ms ease-out 1;
    }

    @keyframes tile-flash {
      0%,
      100% {
        background: var(--tile);
      }

      50% {
        background: #ffd1dc;
      }
    }

    @keyframes remote-play-flash {
      0% {
        transform: scale(0.82);
        background: #ffffff;
        box-shadow:
          inset 0 -0.16rem 0 rgba(0, 0, 0, 0.08),
          0 0 0 0.35rem rgba(15, 139, 141, 0.55);
      }

      45% {
        transform: scale(1.06);
        background: #cceff0;
      }

      100% {
        transform: scale(1);
        background: var(--tile);
      }
    }

    .tile-points {
      position: absolute;
      right: 0.35rem;
      bottom: 0.25rem;
      font: 700 clamp(0.58rem, 2.2vw, 0.78rem)/1 system-ui, sans-serif;
    }

    .board .tile {
      width: calc(100% - 8px);
      max-width: 100%;
      border-width: 2px;
      border-radius: 6px;
      font-size: clamp(1rem, 3.4vw, 1.9rem);
      box-shadow: inset 0 -0.16rem 0 rgba(0, 0, 0, 0.08);
      cursor: default;
    }

    .board .tile-movable {
      cursor: pointer;
    }

    .board .tile-points {
      right: 0.2rem;
      bottom: 0.18rem;
      font-size: clamp(0.48rem, 1.4vw, 0.68rem);
    }

    body.has-player main {
      align-content: start;
      gap: 0.75rem;
      padding-top: clamp(0.85rem, 2vw, 1.35rem);
    }

    body.has-player .masthead {
      row-gap: 0;
      column-gap: 1rem;
    }

    body.has-player .brand {
      font-size: clamp(1.65rem, 4vw, 2.85rem);
      margin-bottom: 0;
    }

    .draw-tile-button {
      display: none;
    }

    body.screen-play .draw-tile-button {
      display: inline-block;
    }

    .rack-controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      justify-self: center;
      gap: 0.75rem;
    }

    .placement-action {
      display: none;
    }

    body.has-active-placement .placement-action {
      display: inline-block;
    }

    .game-message {
      grid-column: 1 / -1;
      min-height: 1.25rem;
      justify-self: center;
      color: var(--rose);
      font: 700 0.9rem/1.3 system-ui, sans-serif;
    }

    .game-message:empty {
      display: none;
    }

    body.screen-play:not(.is-my-turn) .game-message {
      color: var(--accent);
    }

    body.screen-play:not(.is-my-turn) .rack,
    body.screen-play:not(.is-my-turn) .board {
      opacity: 0.82;
    }

    body.screen-play:not(.is-my-turn) .tile-movable {
      cursor: not-allowed;
    }

    .game-button:disabled {
      cursor: not-allowed;
      opacity: 0.58;
      box-shadow: none;
    }

    .game-state-panel {
      width: 100%;
      display: grid;
      gap: 0.75rem;
      padding: 0.85rem;
      border: 2px solid rgba(23, 32, 42, 0.28);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.46);
      font: 700 0.95rem/1.2 system-ui, sans-serif;
      text-align: left;
    }

    .game-state-summary {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 0.5rem 1rem;
    }

    .game-state-kicker {
      color: rgba(23, 32, 42, 0.72);
      font: 800 0.76rem/1.2 system-ui, sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .game-state-value {
      display: block;
      margin-top: 0.15rem;
      font-size: 1.05rem;
    }

    .player-score-list {
      display: grid;
      gap: 0.45rem;
    }

    .player-score-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 0.75rem;
      padding: 0.55rem 0.65rem;
      border: 2px solid rgba(23, 32, 42, 0.18);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.48);
    }

    .player-score-row.current-turn {
      border-color: var(--accent);
      background: rgba(15, 139, 141, 0.12);
    }

    .player-score-name {
      overflow-wrap: anywhere;
    }

    .turn-badge {
      display: inline-block;
      margin-left: 0.35rem;
      padding: 0.12rem 0.35rem;
      border-radius: 8px;
      background: var(--accent);
      color: #ffffff;
      font: 800 0.72rem/1.2 system-ui, sans-serif;
    }

    .player-score-points {
      font: 800 1rem/1 system-ui, sans-serif;
    }

    .state-debug {
      width: 100%;
      display: none;
      gap: 0.5rem;
    }

    body.debug-open .state-debug {
      display: grid;
    }

    .debug-summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.5rem;
      font: 700 0.86rem/1.25 system-ui, sans-serif;
    }

    .debug-summary div {
      padding: 0.45rem 0.55rem;
      border: 2px solid rgba(23, 32, 42, 0.18);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.48);
    }

    .state-debug textarea {
      width: 100%;
      min-height: 8rem;
      resize: vertical;
      border: 2px solid rgba(23, 32, 42, 0.28);
      border-radius: 8px;
      padding: 0.65rem;
      background: rgba(255, 255, 255, 0.72);
      color: var(--ink);
      font: 0.78rem/1.35 Consolas, "Courier New", monospace;
    }

    .state-debug .game-button {
      justify-self: center;
    }

    @media (max-width: 520px) {
      main {
        width: 100%;
        padding-inline: 0.75rem;
      }

      .masthead {
        grid-template-columns: 1fr;
        justify-items: center;
      }

      .brand,
      .game-controls {
        justify-self: center;
      }

      .brand {
        font-size: clamp(2.7rem, 17vw, 4.6rem);
      }

      body.has-player .masthead {
        grid-template-columns: minmax(0, 1fr) auto;
      }

      body.has-player .brand {
        justify-self: start;
        font-size: clamp(1.45rem, 8vw, 2.2rem);
      }

      body.has-player .game-controls {
        justify-self: end;
      }

      .board {
        width: var(--play-width);
      }

      .rack {
        min-height: 3.8rem;
      }

      .debug-summary {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body class="screen-welcome">
  <main aria-label="WordWefter home">
    <header class="masthead">
      <h1 class="brand">WordWefter</h1>
      <div class="game-controls" aria-label="Game controls">
        <div class="identity-panel" id="identity-panel" aria-label="Player identity">
          <label class="sr-only" for="identity-name-input">Your name</label>
          <input class="player-name-input" id="identity-name-input" type="text" aria-label="Your name" placeholder="Your name">
          <button class="game-button" type="button" id="save-identity-button">Continue</button>
        </div>
        <div class="identity-bar" id="identity-bar" aria-label="Current player">
          <span class="identity-current">
            <span class="material-symbols-outlined" aria-hidden="true">account_circle</span>
            <span class="identity-name" id="identity-name-display"></span>
          </span>
          <button class="game-button secondary menu-button" type="button" id="identity-menu-button" aria-label="Menu" aria-expanded="false">
            <span class="material-symbols-outlined" aria-hidden="true">menu</span>
          </button>
          <div class="identity-menu" id="identity-menu" aria-label="Player menu">
            <button class="game-button secondary" type="button" id="show-new-game-button">New Game</button>
            <button class="game-button secondary" type="button" id="show-game-list-button">Game List</button>
            <button class="game-button secondary" type="button" id="logout-button">Logout</button>
          </div>
        </div>
        <div class="player-setup" id="player-setup" aria-label="Player setup">
          <div class="player-name-list" id="player-name-list">
            <div class="player-name-row">
              <label class="sr-only" for="player-name-input-1">Player 1 name</label>
              <input class="player-name-input" id="player-name-input-1" type="text" value="Player 1" aria-label="Player 1 name">
              <button class="game-button secondary player-name-remove" type="button" aria-label="Remove player">-</button>
            </div>
            <div class="player-name-row">
              <label class="sr-only" for="player-name-input-2">Player 2 name</label>
              <input class="player-name-input" id="player-name-input-2" type="text" value="Player 2" aria-label="Player 2 name">
              <button class="game-button secondary player-name-remove" type="button" aria-label="Remove player">-</button>
            </div>
          </div>
          <div class="game-controls">
            <button class="game-button secondary" type="button" id="add-player-button">Add Player</button>
            <button class="game-button" type="button" id="create-game-button">Create Game</button>
          </div>
        </div>
      </div>
      <section class="active-games" aria-label="Active games">
        <div id="active-games-list" class="active-games-list"></div>
      </section>
      <div class="game-message" id="game-message" role="status" aria-live="polite"></div>
    </header>

    <section class="game-area" aria-label="Game board">
      <div class="board" id="board" aria-label="12 by 12 board"></div>
      <div class="rack-wrap">
        <div class="rack" id="rack" aria-label="Rack"></div>
        <div class="rack-controls" aria-label="Rack controls">
          <button class="game-button draw-tile-button" type="button" id="draw-tile-button">Draw Tile</button>
          <button class="game-button placement-action" type="button" id="finish-placement-button">Finish</button>
          <button class="game-button placement-action" type="button" id="reset-placement-button">Reset</button>
        </div>
        <div class="game-state-panel" aria-label="Game state">
          <div class="game-state-summary">
            <div>
              <span class="game-state-kicker">Game</span>
              <span class="game-state-value" id="current-game-id">-----</span>
            </div>
            <div>
              <span class="game-state-kicker">Turn</span>
              <span class="game-state-value" id="current-turn-index">0</span>
            </div>
            <div>
              <span class="game-state-kicker">Playing now</span>
              <span class="game-state-value" id="current-player-name">Player 1</span>
            </div>
          </div>
          <div class="player-score-list" id="player-score-list"></div>
        </div>
        <button class="game-button secondary" type="button" id="debug-toggle-button" aria-expanded="false">Debug</button>
        <div class="state-debug" aria-label="Game state JSON debug">
          <div class="debug-summary">
            <div>Current score: <span id="current-score">0</span></div>
            <div>Current turn score: <span id="current-turn-score">0</span></div>
            <div>Tiles left: <span id="tiles-remaining">0</span></div>
          </div>
          <textarea id="game-state-json" spellcheck="false" aria-label="Game state JSON"></textarea>
          <button class="game-button" type="button" id="install-game-state-button">Install</button>
        </div>
      </div>
    </section>
  </main>

  <script src="./jquery-4.0.0.min.js"></script>
  <script src="./lodash.js"></script>
  <script src="./sortable.min.js"></script>
  <script type="module" src="./game.js?v=gamelist-hash"></script>
</body>
</html>
